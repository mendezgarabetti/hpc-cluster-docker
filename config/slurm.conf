# ============================================================
# slurm.conf — Cluster HPC didáctico (Docker)
# ============================================================

ClusterName=hpc-docker
ControlMachine=master

# Autenticación via MUNGE
AuthType=auth/munge
CryptoType=crypto/munge

# MPI: se deja en none para usar mpirun/srun manualmente
MpiDefault=none

# Rastreo de procesos (linuxproc es el más compatible con contenedores)
ProctrackType=proctrack/linuxproc

# Si un nodo vuelve luego de caerse, reintegrarlo automáticamente
ReturnToService=2

# Rutas de PID y estado
SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmdPidFile=/var/run/slurm/slurmd.pid
StateSaveLocation=/var/spool/slurm/slurmctld
SlurmdSpoolDir=/var/spool/slurm/slurmd

# Puertos
SlurmctldPort=6817
SlurmdPort=6818

SlurmUser=root
SwitchType=switch/none
TaskPlugin=task/none

# Timeouts
InactiveLimit=0
KillWait=30
MinJobAge=300
SlurmctldTimeout=120
SlurmdTimeout=300
Waittime=0

# Scheduler
SchedulerType=sched/backfill
SelectType=select/cons_res
SelectTypeParameters=CR_Core

# Contabilidad (desactivada para simplificar)
AccountingStorageType=accounting_storage/none
JobCompType=jobcomp/none
JobAcctGatherFrequency=30
JobAcctGatherType=jobacct_gather/none

# Logs
SlurmctldDebug=info
SlurmdDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# ============================================================
# Nodos de cómputo
# CPUs=2 → ajustar según los cores que tenga el host
# RealMemory en MB
# ============================================================
NodeName=n01 CPUs=2 RealMemory=1024 State=UNKNOWN
NodeName=n02 CPUs=2 RealMemory=1024 State=UNKNOWN
NodeName=n03 CPUs=2 RealMemory=1024 State=UNKNOWN

# Partición por defecto
PartitionName=cola Nodes=n01,n02,n03 Default=YES MaxTime=INFINITE State=UP
